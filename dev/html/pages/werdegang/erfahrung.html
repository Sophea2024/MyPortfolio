<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Erfahrungen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="@@webRoot/assets/css/main.css">
    <script src="@@webRoot/assets/js/bundle.js" defer></script>
  </head>
  <body data-page="werdegang/erfahrung">
    <!-- ▼ Heder Main ▼ -->   
    @@include('header-main.html')
    
    <!-- ▼ Menu Main ▼ -->
    @@include('menu-main.html')

    <main>
      <div class="container py-5">
        <h1>Erfahrungen</h1>

      </div>

      <div class="m-erfahrung-manager">
        <div class="container">
          <table class="table table-striped">
            <thead class="">
              <tr>
                <th>Anfang - Ende</th>
                <th>Arbeitgeber</th>
                <th>Titel</th>
                <th>Description</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>  
        </div>

        <template class="template-erfahrung-row">
          <tr>
            <td class="td-duration" style="width: 250px;">[ERFAHRUNG_DURATION]</td>
            <td class="td-employer" style="width: 250px;">[ERFAHRUNG_ARBEITGEBER]</td>
            <td class="td-title" style="width: 250px;">[ERFAHRUNG_TITLE]</td>
            <td class="td-description">[ERFAHRUNG_DESCRIPTION]</td>
          </tr>
        </template>
      </div>      
    </main>
    @@include('footer-main.html')
  </body>
</html>
