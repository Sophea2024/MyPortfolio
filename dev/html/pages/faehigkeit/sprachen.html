<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sprachen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="@@webRoot/assets/css/main.css" />
    <script src="@@webRoot/assets/js/bundle.js" defer></script>
  </head>
  <body data-page="faehigkeit/sprachen">
    <!-- ▼ Heder Main ▼ -->
    @@include('header-main.html')

    <!-- ▼ Menu Main ▼ -->
    @@include('menu-main.html')

    <main>
      <div class="container py-5">
        <h1>Sprachen</h1>
      </div>

      <div class="m-sprache-manager">
        <div class="container">
          <table class="table table-striped">
            <thead class="">
              <tr>
                <th>Sprahen</th>
                <th>Sprache-Niveau</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <template class="template-sprache-row">
          <tr>
            <td class="td-name" style="width: 250px">[SPRACHE_NAME]</td>
            <td class="td-niveau" style="width: 250px">[SPRACHE_NIVEAU]</td>
          </tr>
        </template>
      </div>
    </main>

    @@include('footer-main.html')
  </body>
</html>
